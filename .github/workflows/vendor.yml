name: vendor-toolchain

# Build and publish the static toolchain for x86_64 and aarch64: clang, make
# and git are compiled from source on NATIVE runners per arch (no QEMU — the
# multi-hour x86_64 LLVM build runs here in normal CI time), while bpftool,
# esbuild and the libbpf headers are re-hosted from upstream. All are published
# as version-addressed assets on the `toolchain` release, with checksums
# recorded back into build/versions.env.
#
# To avoid burning an hour rebuilding clang on every change, the `detect` job
# fingerprints each from-source tool's build inputs (its Dockerfile + the
# version vars it consumes) against the previous release: a tool only rebuilds
# when its inputs changed, otherwise its binary is reused from that release.
# Tick `rebuild_all` on a manual run to force a full from-source rebuild.
#
# Run manually from the Actions tab (pick the branch), or by changing the build
# recipe on master or a release/* maintenance branch. A push to release/* cuts a
# back-patch: the version is computed from the highest tag reachable on THAT
# branch, so a fix on release/0.6 (forked at v0.6.0) publishes v0.6.1 even while
# master is already on v0.8 — see "Compute next toolchain version" below.

on:
  workflow_dispatch:
    inputs:
      rebuild_all:
        description: 'Rebuild every tool from source (ignore change detection)'
        type: boolean
        default: false
      flavor:
        description: 'Optional variant suffix (e.g. asan, debug, musl). Publishes vX.Y.Z-<flavor> off the latest clean release with NO version bump. Leave empty for a normal release.'
        type: string
        default: ''
  push:
    branches:
      - master
      - 'release/*'
    paths:
      - 'build/**'
      - '.github/workflows/vendor.yml'

permissions:
  contents: write

concurrency:
  # Per-ref: a release/* back-patch never queues behind a master build — each
  # cuts its own line's tag, so they can publish in parallel.
  group: vendor-toolchain-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect:
    # Don't publish on branch creation: pushing a new release/* branch at an
    # existing release commit has no new commits to release (it would otherwise
    # cut a spurious version). Manual dispatch and normal pushes still run.
    if: ${{ github.event_name != 'push' || !github.event.created }}
    runs-on: ubuntu-latest
    outputs:
      clang: ${{ steps.scan.outputs.clang }}
      make: ${{ steps.scan.outputs.make }}
      git: ${{ steps.scan.outputs.git }}
      qemu: ${{ steps.scan.outputs.qemu }}
      prevtag: ${{ steps.scan.outputs.prevtag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Decide which tools to (re)build
        id: scan
        env:
          FORCE: ${{ github.event.inputs.rebuild_all }}
        run: |
          set -euo pipefail
          # Previous published release on THIS line. Release tags point at
          # DETACHED lock-commits (vendor pushes only the tag, never the
          # protected branch), so we can't select by git reachability — we
          # select by tag NAME. On a release/vX.Y branch, restrict to that
          # X.Y line's tags; on master (or any other ref) use all clean tags
          # globally. Suffixed tags (vX.Y.Z-<flavor>) are unordered variants
          # and excluded either way.
          case "${GITHUB_REF_NAME:-}" in
            release/v*) mm="$(printf '%s' "${GITHUB_REF_NAME#release/v}" | cut -d. -f1,2 | sed 's/[.]/\\./g')"
                        tagpat="^v${mm}(\.[0-9]+)?$" ;;
            *)          tagpat='^v[0-9]+\.[0-9]+(\.[0-9]+)?$' ;;
          esac
          # `|| true` so an empty tag set (no match) doesn't fail under pipefail.
          prev="$(git tag -l 'v[0-9]*' | { grep -E "$tagpat" || true; } | sed 's/^v//' | sort -V | tail -1)"
          prevtag=""
          [ -n "$prev" ] && prevtag="v$prev"
          echo "prevtag=$prevtag" >> "$GITHUB_OUTPUT"

          # Read a source file either from the working tree ("WORK") or a git ref.
          read_src() {  # ref path
            if [ "$1" = WORK ]; then cat "$2"; else git show "$1:$2" 2>/dev/null || true; fi
          }
          # Normalise a Dockerfile for fingerprinting: drop blank lines and
          # full-line comments (in a Dockerfile only a line-leading '#' is a
          # comment; inline '#' is part of the instruction) so doc-only edits
          # don't force a rebuild. Parser directives (# syntax=, # escape=) are
          # build-significant, so keep them.
          norm_df() {
            awk '{ low = tolower($0) }
                 low ~ /^[[:space:]]*#[[:space:]]*(syntax|escape)=/ { print; next }
                 /^[[:space:]]*#/                                   { next }
                 /^[[:space:]]*$/                                   { next }
                 { print }'
          }
          # Fingerprint a from-source tool's build inputs: exactly what the Docker
          # build consumes — its Dockerfile (sans comments/blanks) plus the
          # version vars passed as build-args. We hash only those keys (not the
          # whole versions.env), so CI's own checksum/version edits never
          # masquerade as a real change.
          fingerprint() {  # ref tool
            case "$2" in
              clang) df=build/Dockerfile.clang; keys="LLVM_VERSION ALPINE_TAG" ;;
              make)  df=build/Dockerfile.make;  keys="MAKE_VERSION ALPINE_TAG" ;;
              git)   df=build/Dockerfile.git;   keys="GIT_VERSION ALPINE_TAG" ;;
              qemu)  df=build/Dockerfile.qemu;  keys="QEMU_VERSION LIBSLIRP_VERSION ALPINE_TAG" ;;
            esac
            env="$(read_src "$1" build/versions.env)"
            { read_src "$1" "$df" | norm_df
              for k in $keys; do printf '%s\n' "$env" | grep "^$k=" || true; done
            } | sha256sum | awk '{print $1}'
          }

          # A tool builds when forced, when there's no prior release to reuse
          # from, or when its fingerprint differs from that release.
          for tool in clang make git qemu; do
            if [ "${FORCE:-false}" = true ] || [ -z "$prevtag" ] \
               || [ "$(fingerprint WORK "$tool")" != "$(fingerprint "$prevtag" "$tool")" ]; then
              echo "$tool=true"  >> "$GITHUB_OUTPUT"; echo "build  $tool"
            else
              echo "$tool=false" >> "$GITHUB_OUTPUT"; echo "reuse  $tool from $prevtag"
            fi
          done

  build:
    needs: detect
    # One job per (tool, arch) so every tool builds on its own runner in
    # parallel — the multi-hour clang build no longer blocks make/git/qemu, and
    # each job is labelled for the tool it actually builds (e.g. "clang
    # (x86_64)"). Wall-clock collapses from clang+make+git+qemu to ~max(tool).
    strategy:
      fail-fast: false
      matrix:
        tool: [clang, make, git, qemu]
        arch:
          - { platform: amd64, name: x86_64, runner: ubuntu-latest }
          - { platform: arm64, name: aarch64, runner: ubuntu-24.04-arm }
    runs-on: ${{ matrix.arch.runner }}
    name: ${{ matrix.tool }} (${{ matrix.arch.name }})
    env:
      GH_TOKEN: ${{ github.token }}
      TOOL: ${{ matrix.tool }}
      ARCH: ${{ matrix.arch.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.tool }} from source (${{ matrix.arch.name }})
        if: needs.detect.outputs[matrix.tool] == 'true'
        run: |
          set -euo pipefail
          . build/versions.env
          # Per-tool build-args. clang/make/git export a single static binary at
          # out/<tool>; qemu exports a tree (out/bin + out/share/qemu) — a static
          # qemu-system for the optional kernel-matrix runner, trimmed by its
          # Dockerfile to the binary + the firmware blobs lvh's machine loads.
          case "$TOOL" in
            clang) args=(-f build/Dockerfile.clang
                     --build-arg "LLVM_VERSION=${LLVM_VERSION}"
                     --build-arg "ALPINE_TAG=${ALPINE_TAG}"
                     --build-arg "COMPILE_JOBS=$(nproc)") ;;
            make)  args=(-f build/Dockerfile.make
                     --build-arg "MAKE_VERSION=${MAKE_VERSION}"
                     --build-arg "ALPINE_TAG=${ALPINE_TAG}") ;;
            git)   args=(-f build/Dockerfile.git
                     --build-arg "GIT_VERSION=${GIT_VERSION}"
                     --build-arg "ALPINE_TAG=${ALPINE_TAG}") ;;
            qemu)  args=(-f build/Dockerfile.qemu
                     --build-arg "QEMU_VERSION=${QEMU_VERSION}"
                     --build-arg "QEMU_TARGET=${ARCH}-softmmu"
                     --build-arg "LIBSLIRP_VERSION=${LIBSLIRP_VERSION}"
                     --build-arg "ALPINE_TAG=${ALPINE_TAG}") ;;
          esac
          docker buildx build \
            --platform "linux/${{ matrix.arch.platform }}" \
            "${args[@]}" \
            --target export \
            --output "type=local,dest=out" \
            build

      - name: Reuse ${{ matrix.tool }} from ${{ needs.detect.outputs.prevtag }}
        if: needs.detect.outputs[matrix.tool] != 'true'
        run: |
          set -euo pipefail
          mkdir -p out
          if [ "$TOOL" = qemu ]; then
            # qemu rides the release as a per-arch tarball (binary + blobs);
            # unpack it back into the bin/ + share/qemu/ tree the build emits.
            gh release download "${{ needs.detect.outputs.prevtag }}" \
              --repo "$GITHUB_REPOSITORY" -p "qemu-${ARCH}.tar.gz" -O qemu.tar.gz
            tar -xzf qemu.tar.gz -C out
          else
            gh release download "${{ needs.detect.outputs.prevtag }}" \
              --repo "$GITHUB_REPOSITORY" -p "${TOOL}-${ARCH}" -O "out/${TOOL}"
            chmod +x "out/${TOOL}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          # Single binary for clang/make/git; the bin/+share tree for qemu.
          # download-artifact restores this as artifacts/<tool>-<arch>/...,
          # which is exactly what the vendor job assembles from.
          name: ${{ matrix.tool }}-${{ matrix.arch.name }}
          path: out
          if-no-files-found: error

  fetch:
    # Re-hosted tools: each fetch-<tool>.sh just downloads a prebuilt static
    # binary from upstream (no compile), so these run in parallel with the
    # from-source build matrix and each gets its own pass/fail status. No
    # change-detection — the scripts always pull fresh and vendor records the
    # checksum every run. All run on an amd64 runner: the scripts download or
    # extract the target-arch binary without executing it (lvh extracts
    # cross-arch via `docker create --platform`), so no arm runner is needed.
    strategy:
      fail-fast: false
      matrix:
        tool: [bpftool, veristat, lvh, esbuild]
        arch:
          - { platform: amd64, name: x86_64 }
          - { platform: arm64, name: aarch64 }
    runs-on: ubuntu-latest
    name: ${{ matrix.tool }} (${{ matrix.arch.name }})
    steps:
      - uses: actions/checkout@v4

      - name: Fetch ${{ matrix.tool }} (${{ matrix.arch.name }})
        run: sh build/fetch-${{ matrix.tool }}.sh ${{ matrix.arch.platform }}

      - uses: actions/upload-artifact@v4
        with:
          # Restored by vendor as artifacts/<tool>-<arch>/<tool>, same layout as
          # the from-source build artifacts so vendor assembles them uniformly.
          name: ${{ matrix.tool }}-${{ matrix.arch.name }}
          path: ${{ matrix.arch.name }}/${{ matrix.tool }}
          if-no-files-found: error

  vendor:
    needs: [build, fetch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all build + fetch artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble toolchain tree
        run: |
          set -euo pipefail
          # Every single-binary tool — from-source (clang/make/git) and
          # re-hosted (bpftool/veristat/lvh/esbuild) — arrives as the artifact
          # <tool>-<arch> holding one file, so install them all the same way.
          # qemu is the exception (a bin/+share tree), packed separately below.
          for a in x86_64 aarch64; do
            for t in clang make git bpftool veristat lvh esbuild; do
              install -Dm755 "artifacts/${t}-${a}/${t}" "${a}/${t}"
            done
          done
          # libbpf headers stay inline: arch-independent, and vendor commits
          # include/ into the version tag below, so they must land in the tree.
          sh build/fetch-libbpf-headers.sh
          ls -la x86_64 aarch64 include/bpf
          file x86_64/* aarch64/* || true

      - name: Build libbpf-headers tarball
        run: |
          set -euo pipefail
          # Top-level bpf/ dir so a consumer extracts it as <include>/bpf/*.h.
          tar -czf libbpf-headers.tar.gz -C include bpf

      - name: Build qemu tarballs
        run: |
          set -euo pipefail
          # Pack each arch's qemu tree (bin/ + share/qemu/) so the matrix runner
          # extracts it as <dest>/bin/qemu-system-<arch> with its blobs beside it
          # (qemu finds its datadir relative to the binary). upload-artifact drops
          # the exec bit, so restore it before tarring.
          for a in x86_64 aarch64; do
            chmod +x "artifacts/qemu-$a/bin/qemu-system-$a"
            tar -czf "qemu-$a.tar.gz" -C "artifacts/qemu-$a" .
          done

      - name: Compute next toolchain version
        id: ver
        env:
          FLAVOR: ${{ github.event.inputs.flavor }}
        run: |
          set -euo pipefail
          # Releases are semver vMAJOR.MINOR.PATCH, one immutable release each.
          # The bump is the HIGHEST level any commit since the previous release
          # on THIS line (latest..HEAD) asks for, via a marker in its SUBJECT:
          #   * [bump:major]   -> major  (X+1.0.0)
          #   * [bump:minor]   -> minor  (X.Y+1.0)
          #   * [bump:patch]   -> patch  (X.Y.Z+1)
          # An UNMARKED commit takes the branch default: minor on master, patch
          # on a release/* maintenance branch (where you're almost always
          # back-patching, and a minor bump could collide with a mainline tag).
          # "latest" is the highest tag on THIS line, selected by NAME (release
          # tags are detached lock-commits, so reachability can't be used): a
          # release/vX.Y branch sees only its X.Y line, master sees all clean
          # tags. So a back-patch on release/v0.6 bumps the 0.6 line, not
          # master's. The PR check (commit-convention.yml) rejects malformed
          # markers before merge. Pre-semver tags (v0.1..v0.5) read as 0.MINOR.0;
          # the first publish ever is v0.1.0.
          case "${GITHUB_REF_NAME:-}" in
            release/v*) default_lvl=1   # maintenance line: unmarked -> patch
                        mm="$(printf '%s' "${GITHUB_REF_NAME#release/v}" | cut -d. -f1,2 | sed 's/[.]/\\./g')"
                        tagpat="^v${mm}(\.[0-9]+)?$" ;;
            *)          default_lvl=2   # mainline: unmarked -> minor
                        tagpat='^v[0-9]+\.[0-9]+(\.[0-9]+)?$' ;;
          esac
          # Clean tags on this line only; suffixed tags (vX.Y.Z-<flavor>) are
          # unordered variants and never advance the line.
          # `|| true` so an empty tag set (no match) doesn't fail under pipefail.
          latest="$(git tag -l 'v[0-9]*' | { grep -E "$tagpat" || true; } | sed 's/^v//' | sort -V | tail -1)"
          flavor="${FLAVOR:-}"
          if [ -n "$flavor" ]; then
            # A flavor build is an unordered VARIANT of an existing release: it
            # pins to the latest clean release reachable and appends the suffix,
            # WITHOUT bumping the line (so it never becomes a baseline above).
            # Dispatch-only; consumers opt in by pinning vX.Y.Z-<flavor>.
            echo "$flavor" | grep -qE '^[a-z0-9][a-z0-9.]*$' \
              || { echo "::error::flavor must match ^[a-z0-9][a-z0-9.]*$ (got '$flavor')"; exit 1; }
            [ -n "$latest" ] || { echo "::error::no clean vX.Y.Z release to flavor yet"; exit 1; }
            next="${latest}-${flavor}"
          elif [ -z "$latest" ]; then
            next="0.1.0"
          else
            # No new commits since this line's latest release => nothing to
            # publish. Skip cleanly (the later steps are gated on ver.skip) so a
            # no-op trigger can't fall through to a bump.
            commits="$(git rev-list "v${latest}..HEAD")"
            if [ -z "$commits" ]; then
              echo "no new commits since v${latest} — nothing to release"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            maj=$(echo "$latest" | awk -F. '{print $1+0}')
            min=$(echo "$latest" | awk -F. '{print $2+0}')
            pat=$(echo "$latest" | awk -F. '{print $3+0}')   # missing patch -> 0
            rank=0   # highest level seen: 1=patch 2=minor 3=major
            while IFS= read -r sha; do
              [ -n "$sha" ] || continue
              msg="$(git log -1 --format=%s "$sha")"   # subject line only
              if   printf '%s' "$msg" | grep -qi '\[bump:major\]'; then lvl=3
              elif printf '%s' "$msg" | grep -qi '\[bump:minor\]'; then lvl=2
              elif printf '%s' "$msg" | grep -qi '\[bump:patch\]'; then lvl=1
              else lvl=$default_lvl; fi
              [ "$lvl" -gt "$rank" ] && rank=$lvl
            done <<< "$commits"
            case "$rank" in
              3) next="$((maj + 1)).0.0" ;;
              2) next="${maj}.$((min + 1)).0" ;;
              1) next="${maj}.${min}.$((pat + 1))" ;;
            esac
          fi
          echo "TC=$next" >> "$GITHUB_ENV"
          sed -i "s|^TOOLCHAIN_VERSION=.*|TOOLCHAIN_VERSION=${next}|" build/versions.env
          echo "next toolchain version: v${next}"

      - name: Record checksums in versions.env
        if: steps.ver.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # Record the checksum of every binary we publish, so a consumer
          # verifies the exact artifact it downloads from our release.
          for arch in x86_64 aarch64; do
            for tool in clang make bpftool veristat lvh esbuild git; do
              s="$(sha256sum "$arch/$tool" | awk '{print $1}')"
              key="$(echo "$tool" | tr a-z A-Z)_SHA256_${arch}"
              sed -i "s|^${key}=.*|${key}=${s}|" build/versions.env
            done
          done
          hsum="$(sha256sum libbpf-headers.tar.gz | awk '{print $1}')"
          sed -i "s|^LIBBPF_HEADERS_SHA256=.*|LIBBPF_HEADERS_SHA256=${hsum}|" build/versions.env
          # qemu ships as a per-arch tarball (binary + blobs), so checksum the tarball.
          for arch in x86_64 aarch64; do
            qs="$(sha256sum "qemu-$arch.tar.gz" | awk '{print $1}')"
            sed -i "s|^QEMU_SHA256_${arch}=.*|QEMU_SHA256_${arch}=${qs}|" build/versions.env
          done
          grep -E '_SHA256_|^LIBBPF_HEADERS_SHA256=' build/versions.env

      - name: Tag immutable v${{ env.TC }} snapshot
        if: steps.ver.outputs.skip != 'true'
        run: |
          set -euo pipefail
          tag="v${TC}"
          # master is protected (PR/merge-queue only), so we never push it. The
          # recorded lock (bumped version + checksums) and the SDK headers land
          # in the commit the version tag points at, so the tag is fully
          # self-contained: `git show ${tag}:build/versions.env` yields the exact
          # lock for this release. Binaries are NOT committed — they ride the
          # release as assets (x86_64/ and aarch64/ are gitignored).
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "tag ${tag} already exists — leaving the immutable tag as-is"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add include build/versions.env
            git commit -m "toolchain ${tag}: record version, checksums + headers"
            git tag -a "$tag" -m "Static build toolchain ${tag}"
            git push origin "refs/tags/${tag}"
          fi

      - name: Publish v${{ env.TC }} release
        if: steps.ver.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="v${TC}"
          # Immutable, version-tagged release pinned to the snapshot tag above;
          # the tag carries the version, so assets are plain-named (<tool>-<arch>).
          # Consumers pin this one tag.
          mkdir -p dist
          for a in x86_64 aarch64; do
            for t in clang make bpftool veristat lvh esbuild git; do cp "$a/$t" "dist/${t}-${a}"; done
          done
          cp libbpf-headers.tar.gz dist/libbpf-headers.tar.gz
          # qemu for the optional kernel-matrix runner (fetched on demand, not by `make`).
          for a in x86_64 aarch64; do cp "qemu-$a.tar.gz" "dist/qemu-$a.tar.gz"; done
          # Pick the "Latest" flag explicitly (GitHub's default is recency-based,
          # so a release/* back-port cut after a newer mainline release would
          # otherwise steal the badge):
          #   * flavor (vX.Y.Z-<flavor>) -> --prerelease (GitHub never marks it Latest)
          #   * mainline (master)        -> --latest      (newest mainline IS Latest)
          #   * release/* back-port      -> --latest=false (can't steal it)
          case "$tag" in
            *-*) flags="--prerelease --latest=false" ;;
            *)   if [ "${GITHUB_REF_NAME}" = master ]; then flags="--latest"; else flags="--latest=false"; fi ;;
          esac
          gh release view "$tag" >/dev/null 2>&1 \
            || gh release create "$tag" --title "$tag" $flags \
                 --notes "Static build toolchain $tag — clang/make/git built from source; bpftool/esbuild/libbpf headers re-hosted; qemu for the kernel-matrix runner."
          # --clobber so a same-version re-run refreshes assets.
          gh release upload "$tag" dist/* --clobber

      - name: Open maintenance branch for a new minor/major line
        if: steps.ver.outputs.skip != 'true' && github.ref_name == 'master'
        run: |
          set -euo pipefail
          # When master cuts a NEW line (vX.Y.0), fork release/vX.Y at the same
          # immutable commit so future back-ports have somewhere to land.
          # Patches (vX.Y.Z, Z>0) and flavor builds (vX.Y.Z-<flavor>) don't open
          # a line. Creating the branch is safe: the branch-creation push is
          # ignored by the detect guard, so it won't cut a spurious release.
          ver="${TC}"
          case "$ver" in *-*) echo "flavor build ($ver) — no maintenance branch"; exit 0 ;; esac
          if [ "${ver##*.}" != 0 ]; then echo "patch release ($ver) — no new line"; exit 0; fi
          br="release/v${ver%.*}"   # release/vX.Y
          if git ls-remote --exit-code --heads origin "$br" >/dev/null 2>&1; then
            echo "$br already exists — leaving it"; exit 0
          fi
          # HEAD is the immutable lock commit the v${ver} tag points at.
          if git push origin "HEAD:refs/heads/${br}"; then
            echo "opened maintenance branch ${br} at $(git rev-parse --short HEAD)"
          else
            echo "::warning::could not open ${br} (ruleset/permissions?) — create it manually if a back-port is needed"
          fi
